name = "sharebox"
compatibility_date = "2025-04-01"
compatibility_flags = ["nodejs_compat"]
pages_build_output_dir = ".svelte-kit/cloudflare"

# Local development bindings (overridden by Cloudflare Pages dashboard in production).

[[d1_databases]]
binding = "DB"
database_name = "sharebox-db"
database_id = "REPLACE_WITH_D1_DATABASE_ID"
migrations_dir = "src/lib/server/db/migrations"

[[r2_buckets]]
binding = "FILES"
bucket_name = "sharebox-files"
